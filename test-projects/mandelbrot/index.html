<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandelbrot Fractal Explorer | Asclepius Sandbox</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; color: white; }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas:active { cursor: grabbing; }
    
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 20px;
      background: rgba(10, 15, 25, 0.85);
      border: 1px solid rgba(0, 255, 150, 0.3);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      min-width: 300px;
      z-index: 10;
    }

    h1 { margin: 0 0 15px 0; font-size: 18px; font-weight: 600; color: #00ffa3; display: flex; align-items: center; gap: 8px;}
    h1::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #00ffa3; border-radius: 50%; box-shadow: 0 0 8px #00ffa3; }

    .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: #aaa; }
    .stat-val { color: #fff; font-family: monospace; font-size: 14px; }

    .control-group { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    .control-label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
    
    input[type=range] { width: 100%; accent-color: #00ffa3; }
    
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    button {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }
    button:hover { background: rgba(0, 255, 150, 0.2); border-color: #00ffa3; }
    button.active { background: rgba(0, 255, 150, 0.15); border-color: #00ffa3; color: #00ffa3; font-weight: 600; }

    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ffa3; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  </style>
</head>
<body>

  <div id="hud">
    <h1>Fractal-Dev Explorer</h1>
    
    <div class="stat-row"><span>Center X:</span> <span id="val-x" class="stat-val">-0.50000000</span></div>
    <div class="stat-row"><span>Center Y:</span> <span id="val-y" class="stat-val">0.00000000</span></div>
    <div class="stat-row"><span>Zoom:</span> <span id="val-zoom" class="stat-val">1.0x</span></div>
    <div class="stat-row"><span>Render Time:</span> <span id="val-time" class="stat-val">0ms</span></div>

    <div class="control-group">
      <label class="control-label">Max Iterations: <span id="val-iter" style="color:white; float:right;">256</span></label>
      <input type="range" id="slider-iter" min="64" max="2048" step="64" value="256">
    </div>

    <div class="control-group">
      <label class="control-label">Color Palette</label>
      <div class="btn-grid">
        <button id="pal-ultra" class="active">Ultraviolet</button>
        <button id="pal-fire">Hellfire</button>
        <button id="pal-ocean">Deep Ocean</button>
        <button id="pal-mono">Monochrome</button>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">Navigation Presets</label>
      <div class="btn-grid">
        <button id="nav-home">Reset View</button>
        <button id="nav-seahorse">Seahorse Valley</button>
        <button id="nav-elephant">Elephant Valley</button>
        <button id="nav-lightning">Lightning</button>
      </div>
    </div>
  </div>

  <div id="loading">Rendering...</div>
  <canvas id="mandelbrot"></canvas>

  <script>
    const canvas = document.getElementById('mandelbrot');
    const ctx = canvas.getContext('2d', { alpha: false });
    const loading = document.getElementById('loading');
    
    // UI Elements
    const elX = document.getElementById('val-x');
    const elY = document.getElementById('val-y');
    const elZoom = document.getElementById('val-zoom');
    const elTime = document.getElementById('val-time');
    const elIter = document.getElementById('val-iter');
    const sliderIter = document.getElementById('slider-iter');

    // State
    let width, height;
    let centerX = -0.5;
    let centerY = 0.0;
    let zoom = 1.0;
    let maxIterations = 256;
    let currentPalette = 'ultra';
    let isDragging = false;
    let dragStartX, dragStartY;
    let renderTimer = null;

    // Viewport scaling
    const BASE_VIEW = 4.0; 

    // Resize handler
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      requestRender();
    }
    window.addEventListener('resize', resize);

    // Color Palettes
    function getColor(iter, maxIter, palette) {
      if (iter === maxIter) return [0, 0, 0];
      
      const t = iter / maxIter;
      
      if (palette === 'ultra') {
        const r = Math.sin(0.016 * iter + 4) * 230 + 25;
        const g = Math.sin(0.013 * iter + 2) * 230 + 25;
        const b = Math.sin(0.01 * iter + 1) * 230 + 25;
        return [r, g, b];
      } 
      else if (palette === 'fire') {
        return [
          Math.min(255, t * 255 * 3),
          Math.min(255, (t - 0.33) * 255 * 3),
          Math.min(255, (t - 0.66) * 255 * 3)
        ];
      }
      else if (palette === 'ocean') {
        return [
          Math.min(255, (t - 0.5) * 255 * 2),
          Math.min(255, t * 255 * 1.5),
          Math.min(255, t * 255 * 2 + 50)
        ];
      }
      else {
        // Monochrome
        const v = (iter % 20) / 20 * 255;
        return [v, v, v];
      }
    }

    // Core Rendering Engine (CPU Based)
    function render() {
      const startTime = performance.now();
      
      const imgData = ctx.createImageData(width, height);
      const data = imgData.data;

      // Calculate view boundaries
      const aspect = width / height;
      const xRange = BASE_VIEW / zoom;
      const yRange = (BASE_VIEW / aspect) / zoom;
      
      const xMin = centerX - xRange / 2;
      const xMax = centerX + xRange / 2;
      const yMin = centerY - yRange / 2;
      
      // Compute delta per pixel
      const dx = xRange / width;
      const dy = yRange / height;

      // Main Loop
      let index = 0;
      for (let y = 0; y < height; y++) {
        const c_im = yMax = yMin + y * dy;
        for (let x = 0; x < width; x++) {
          const c_re = xMin + x * dx;
          
          let z_re = c_re;
          let z_im = c_im;
          let iter = 0;
          let isInside = true;

          // Optimized Mandelbrot calculation
          while (iter < maxIterations) {
            const z_re_sq = z_re * z_re;
            const z_im_sq = z_im * z_im;
            
            if (z_re_sq + z_im_sq > 4.0) {
              isInside = false;
              break;
            }
            
            z_im = 2.0 * z_re * z_im + c_im;
            z_re = z_re_sq - z_im_sq + c_re;
            iter++;
          }

          // Apply color
          const [r, g, b] = getColor(iter, maxIterations, currentPalette);
          data[index++] = r;
          data[index++] = g;
          data[index++] = b;
          data[index++] = 255; // Alpha
        }
      }

      ctx.putImageData(imgData, 0, 0);
      
      const timeTaken = (performance.now() - startTime).toFixed(1);
      updateHUD(timeTaken);
      loading.style.opacity = '0';
    }

    // Debounced Render
    function requestRender() {
      loading.style.opacity = '1';
      if (renderTimer) clearTimeout(renderTimer);
      renderTimer = setTimeout(() => {
        // Yield to browser to show "Rendering..." text
        requestAnimationFrame(render);
      }, 10);
    }

    // HUD Update
    function updateHUD(timeStr) {
      elX.textContent = centerX.toFixed(8);
      elY.textContent = centerY.toFixed(8);
      elZoom.textContent = (zoom > 1000 ? (zoom/1000).toFixed(1) + 'k' : zoom.toFixed(1)) + 'x';
      if(timeStr) elTime.textContent = timeStr + 'ms';
    }

    // --- Interaction Logic ---

    // Drag to Pan
    canvas.addEventListener('mousedown', e => {
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        requestRender();
      }
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      
      const aspect = width / height;
      const xRange = BASE_VIEW / zoom;
      const yRange = (BASE_VIEW / aspect) / zoom;
      
      const dx = ((dragStartX - e.clientX) / width) * xRange;
      const dy = ((dragStartY - e.clientY) / height) * yRange;
      
      centerX += dx;
      centerY += dy;
      
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      
      updateHUD();
      // Low-res fast pan could go here, but for simplicity we rely on debounced render
      requestRender();
    });

    // Scroll to Zoom
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      
      // Find math coordinates of mouse cursor before zoom
      const aspect = width / height;
      const xRange = BASE_VIEW / zoom;
      const yRange = (BASE_VIEW / aspect) / zoom;
      
      const mouseRe = centerX - xRange/2 + (e.clientX / width) * xRange;
      const mouseIm = centerY - yRange/2 + (e.clientY / height) * yRange;

      // Apply zoom
      const zoomFactor = e.deltaY < 0 ? 1.5 : 1/1.5;
      zoom *= zoomFactor;
      
      // Ensure we don't zoom out too far
      if (zoom < 0.5) zoom = 0.5;

      // Adjust center so mouse stays over same fractal point
      const newXRange = BASE_VIEW / zoom;
      const newYRange = (BASE_VIEW / aspect) / zoom;
      
      centerX = mouseRe - (e.clientX / width) * newXRange;
      centerY = mouseIm - (e.clientY / height) * newYRange;

      updateHUD();
      requestRender();
    });

    // --- UI Controls ---

    sliderIter.addEventListener('input', e => {
      maxIterations = parseInt(e.target.value);
      elIter.textContent = maxIterations;
    });
    sliderIter.addEventListener('change', requestRender);

    const palettes = ['ultra', 'fire', 'ocean', 'mono'];
    palettes.forEach(p => {
      document.getElementById('pal-' + p).addEventListener('click', (e) => {
        palettes.forEach(id => document.getElementById('pal-' + id).classList.remove('active'));
        e.target.classList.add('active');
        currentPalette = p;
        requestRender();
      });
    });

    const presets = {
      'home': { x: -0.5, y: 0.0, z: 1 },
      'seahorse': { x: -0.743643887037158704752191506114774, y: 0.131825904205311970493132056385139, z: 10000 },
      'elephant': { x: 0.27322626, y: 0.595153338, z: 500 },
      'lightning': { x: -0.1528, y: 1.0397, z: 200 }
    };

    Object.keys(presets).forEach(id => {
      document.getElementById('nav-' + id).addEventListener('click', () => {
        const p = presets[id];
        centerX = p.x;
        centerY = p.y;
        zoom = p.z;
        requestRender();
      });
    });

    // Init
    resize();
  </script>
</body>
</html>
